name: Refresh SentiScore

# Rebuilds docs/wc/senti.json from GDELT news tone and commits it back to main.
# GitHub Pages (served from /docs on main) then redeploys automatically, so the
# site stays serverless at runtime while sentiment refreshes on a schedule.
#
# Uses the default source=news (Google News RSS + VADER), which is reachable from
# most networks/CI. build_senti.py aborts (exit 2) if too few teams get coverage —
# so a throttled/blocked run fails the job WITHOUT committing an empty file,
# leaving the last good JSON in place. Switch to --source gdelt if you prefer
# GDELT document tone and the runner IP isn't rate-limited.

on:
  schedule:
    - cron: '17 6 * * *'      # daily, 06:17 UTC
  workflow_dispatch:          # manual "Run workflow" button
    inputs:
      timespan:
        description: 'GDELT lookback window (e.g. 7d, 14d, 1m)'
        default: '14d'
        required: false

permissions:
  contents: write             # allow the commit-back

concurrency:
  group: senti
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install deps
        run: python -m pip install --quiet vaderSentiment

      - name: Build SentiScore
        run: python scripts/build_senti.py --timespan "${{ github.event.inputs.timespan || '14d' }}"

      - name: Commit senti.json if it changed
        run: |
          if git diff --quiet -- docs/wc/senti.json; then
            echo "No SentiScore change — nothing to commit."
            exit 0
          fi
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/wc/senti.json
          git commit -m "chore(wc): refresh SentiScore from GDELT news tone"
          git push
