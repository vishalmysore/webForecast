<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>webForecast — 200M Time-Series Transformer (WebGPU)</title>
  <link rel="stylesheet" href="./style.css" />
</head>
<body>
  <main class="app">
    <header>
      <h1>webForecast</h1>
      <p class="sub">
        The from-scratch TimesFM 70M patched decoder, running in your browser via
        WebGPU. Instance-normalize → patch → forecast → denormalize, no server.
      </p>
    </header>

    <section class="controls">
      <button id="demoBtn">Load demo series</button>
      <label class="file-label">
        Load CSV/JSON
        <input id="file" type="file" accept=".csv,.json,.txt" hidden />
      </label>
      <label class="horizon-label">
        Horizon (steps)
        <input id="horizon" type="number" min="16" max="512" step="16" value="128" />
      </label>
      <button id="runBtn" disabled>Forecast</button>
    </section>

    <section class="chart-wrap">
      <canvas id="chart"></canvas>
      <div class="legend">
        <span><i class="sw hist"></i> history</span>
        <span><i class="sw fc"></i> forecast (q50)</span>
        <span><i class="sw band"></i> q10–q90</span>
      </div>
    </section>

    <footer>
      <div id="status" class="status">initializing…</div>
      <div class="meta">TimesFM 70M · d 1024 · 10 layers · 16 heads · patch 32 · ctx 512 · int8 ONNX</div>
    </footer>
  </main>

  <script src="./main.js"></script>
</body>
</html>
